<style>

.cart-page{
padding:120px 50px;

.cart-page h1{
text-align:center;

}

.cart-container{
max-width:1000px;

}

.cart-item{
background:#111827;
padding:20px;
border-radius:15px;
margin-bottom:20px;

display:flex;
justify-content:space-between;

}

.cart-item h3{
color:white;
}

.cart-item p{

}

.remove-btn{
background:red;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

.total-section{
background:#111827;
padding:25px;
border-radius:15px;
margin-top:30px;
text-align:center;
}

.total-section h2{
color:#22C55E;
margin-bottom:15px;
}

.checkout-btn{
background:#22C55E;
color:white;
border:none;
padding:15px 25px;
border-radius:10px;
cursor:pointer;
font-size:16px;
font-weight:bold;
margin-top:10px;
}

.clear-btn{
background:#ef4444;
color:white;
border:none;
padding:15px 25px;
border-radius:10px;
cursor:pointer;
font-size:16px;
font-weight:bold;
margin-top:10px;
margin-left:10px;

.empty-cart{
